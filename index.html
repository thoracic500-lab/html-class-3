<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
</head>
<body>
<h2>CREATE YOUR ACCOUNT</h2>
    <form action="">
<input type="text" placeholder="Enter Your First Name">
<input type="text" placeholder="Enter Your last Name">

<br><br>
<input type="number" placeholder="Enter Your number">
<input type="email" placeholder="Enter Your email">

<br><br>
<input type="password" placeholder="Enter Your password">

<br>
<h3>Basic Coding</h3>

<input type="checkbox" id="ID 1">
<label for="ID 1">HTML</label>

<input type="checkbox" id="ID 2">
<label for="ID 2">CSS</label>

<input type="checkbox" id="ID 3">
<label for="ID 3">JS</label>

<h3>Gender</h3>
<input type="radio" name="Gender" id="ID 4">
<label for="ID 4">Male</label>

<input type="radio" name="Gender" id="ID 5">
<label for="ID 5">Female</label>

<h3>Choose your color</h3>
<input type="color">

<h3>Date of birth</h3>
<input type="date">

<h3>Time</h3>
<input type="time">

<br><br>
<input type="search"placeholder="Search" >

<h3>Enter Your Facebook Profile Link</h3>
<input type="url"placeholder="https://facebook.com">

<h3>Select Difficulty Level</h3>
<input type="range">

<h3>Select your city</h3>
<select name="city" id="">city
<option value="Dhaka">Dhaka</option>
<option value="Ctg">Ctg</option>
<option value="Cumilla">Cumilla</option>
</select>
<h3>Select a file to upload</h3>
<input type="file">

<br><br>
<input type="reset">

<br><br>
<button type="submit">submit</button>

    </form>
</body>
</html>
